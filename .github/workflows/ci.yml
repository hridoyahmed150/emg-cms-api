name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Matches vitest.config.ts (test DB on :5433, db emg_cms_test, user emg).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: emg
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: emg_cms_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U emg -d emg_cms_test"
          --health-interval 10s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://emg:dev_password@localhost:5433/emg_cms_test
      JWT_ACCESS_SECRET: ci_access_secret_at_least_16_chars
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_16_chars

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm test
